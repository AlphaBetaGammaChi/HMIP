site_name: HMIP
site_description: Hydrogen Model Intercomparison Project (HMIP) is a Community Model Intercomparison Project dedicated to exploring and constraining the impact of hydrogen driven emissions on chemistry, climate and astmospehric parameters.
site_author: AlphaBetaGammaChi
site_url: https://wcrp-cmip.github.io/MIP-template/ https://github.com/AlphaBetaGammaChi/HMIP
repo_url: https://AlphaBetaGammaChi/HMIP
repo_name: AlphaBetaGammaChi/HMIP

# Use relative URLs within pages
use_directory_urls: true

# Theme configuration
theme:
  name: shadcn
  palette:
    primary: blue
    accent: cyan
  show_stargazers: false

# Plugins
plugins:
  - search

# Custom CSS and JavaScript
extra_css:
  - assets/custom.css

extra_javascript:
  - assets/custom.js

# Navigation is auto-generated from folder structure

# Markdown extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

# Versioning
extra:
  version:
    provider: mike
    default: latest
